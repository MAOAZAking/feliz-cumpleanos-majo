<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <title>Feliz Cumple Majo - 22</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #333; font-family: 'Arial', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        
        /* UI Overlay General */
        .ui-layer {
            position: absolute;
            pointer-events: none; /* Permite clickear el 3D a través */
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }
        
        /* Ajustes para móviles */
        @media (max-width: 600px) {
            .btn {
                padding: 15px 30px;
                font-size: 20px;
                width: 80%;
                border: solid 3px black;
                /* Animación de palpitar */
                animation: palpitar 1s infinite;
                }

                /* Keyframes de la animación */
                @keyframes palpitar {
                0%, 100% {
                    transform: scale(1);
                }
                50% {
                    transform: scale(1.1); /* Aumenta tamaño al 110% */
                }
                }
            #interfaz-foto { width: 70vw; height: 40vh; left: 15vw; }
            .btn-icon { width: 70px; height: 70px; }
            #cargando { font-size: 18px; text-align: center; padding: 20px; }
        }
        
        /* Mensaje de estado para la foto */
        #mensaje-estado {
            display: none;
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px 25px;
            border-radius: 30px;
            font-size: 1.2rem;
            z-index: 100;
            text-align: center;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        /* Botones interactivos */
        .btn {
            pointer-events: auto;
            background: rgba(255, 105, 180, 0.9);
            color: white;
            border: solid 3px black;
            padding: 12px 24px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.2s, background 0.2s;
            text-transform: uppercase;
            font-weight: bold;
            /* Animación de palpitar */
            animation: palpitar 1s infinite;
            }

            /* Keyframes de la animación */
            @keyframes palpitar {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1); /* Aumenta tamaño al 110% */
            }

        }
        .btn:active { transform: scale(0.95); }
        .btn-icon { font-size: 24px; padding: 15px; border-radius: 50%; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center;}
        
        /* Modo Foto UI */
        #interfaz-foto {
            display: none;
            position: absolute;
            top: 20px; 
            left: 20px; 
            width: 150px; 
            height: 200px;
            background: #000;
            border: 4px solid white;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            z-index: 10;
            pointer-events: auto;
        }
        #transmision-camara {
            width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); border-radius: 6px;
        }
        .camera-controls {
            position: absolute; bottom: 30px; width: 100%;
            display: flex; justify-content: center;
        }
        .cerrar-camara {
            position: absolute; top: -15px; right: -15px;
            background: red; color: white; width: 30px; height: 30px; border-radius: 50%; font-size: 18px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        /* Botones de acción principales */
        #controles-principales {
            position: absolute; 
            bottom: 30px; 
            width: 100%; 
            text-align: center;
            pointer-events: none;
        }
        
        #controles-resultado {
            display: none; /* Se muestra después de tomar la foto */
            pointer-events: auto;
            gap: 15px;
            justify-content: center;
            width: 100%;
        }

        /* Loading Overlay */
        /* Animación de Carga "Abrir Ojos" */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999;
            display: flex; flex-direction: column;
            pointer-events: none; /* Permitir clicks tras ocultarse */
        }
        
        .eyelid {
            width: 100%;
            height: 50%;
            background-color: #000;
            transition: transform 1.8s cubic-bezier(0.645, 0.045, 0.355, 1); /* Animación suave y lenta */
            z-index: 2;
        }
        
        #eyelid-top { transform-origin: top; }
        #eyelid-bottom { transform-origin: bottom; }
        
        .loading-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: 'Arial', sans-serif;
            font-size: 24px;
            z-index: 3;
            transition: opacity 0.5s;
        }

        /* Clase para activar la animación de abrir ojos */
        .eyes-open #eyelid-top { transform: translateY(-100%); }
        .eyes-open #eyelid-bottom { transform: translateY(100%); }
        .eyes-open .loading-text { opacity: 0; }
    </style>

</head>
<body>
    
    <!-- Pantalla de carga con animación de párpados -->
    <div id="loading-screen">
        <div id="eyelid-top" class="eyelid"></div>
        <div class="loading-text" id="loading-text">Despertando en el cumple de Majo...</div>

    <div id="mensaje-estado"></div>

    <!-- Contenedor del Botón Inicial (En la pared trasera virtualmente, pero botón físico aquí) -->
    <div class="ui-layer">
        <div id="controles-principales">

    <!-- UI Secreta de Regalos -->
    <div id="gift-ui" style="display: none;">
        <button id="btn-close-gift" class="btn" style="position:absolute; top:20px; right:20px; pointer-events:auto; background:rgba(200,50,50,0.9);">✕</button>
        <div id="letter-overlay">
            <p>Hola, feliz cumpleaños Majo, Dios te bendiga hoy y siempre</p>
        </div>
        <div class="gift-controls">
            <button id="btn-prev-gift" class="btn" style="display:none;">⬅ Anterior</button>

    <!-- UI de Cámara -->
    <div id="interfaz-foto">
        <video id="transmision-camara" autoplay playsinline></video>
        <button class="cerrar-camara" id="boton-cerrar-camara">✕</button>

    <!-- Canvas oculto para procesar texturas -->
    <canvas id="canvas-temporal" style="display:none;"></canvas>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { FontLoader } from 'three/addons/loaders/FontLoader.js';
        import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- CONFIGURACIÓN BOMBILLO ---
        // Modifica estos valores para mover el bombillo
        const configBombillo = { x: 0, y: 13, z: -15 }; 

        // --- Configuración Escena ---
        const contenedor = document.getElementById('contenedor-canvas');
        const escena = new THREE.Scene();
        escena.background = new THREE.Color(0xffe4e1); // Color de fondo (Rosado pálido)
        // escena.fog = new THREE.Fog(0xffe4e1, 10, 50); // Niebla para suavizar el fondo (DESACTIVADA)

        const camara = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
        const renderizador = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true }); // preserveDrawingBuffer es necesario para tomar la foto
        renderizador.setSize(window.innerWidth, window.innerHeight);
        renderizador.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Hace que se vea nítido en celulares
        renderizador.shadowMap.enabled = true; // Activar sombras
        contenedor.appendChild(renderizador.domElement);

        // --- Controles ---
        const controles = new OrbitControls(camara, renderizador.domElement);
        controles.enablePan = false; // Bloquear movimiento lateral de la cámara
        controles.enableZoom = false; // Bloquear zoom para sensación de "estar parado"
        controles.maxPolarAngle = Math.PI; // Permitir mirar hasta arriba
        controles.rotateSpeed = -0.5; // Invertir rotación para sensación de "mirar alrededor" (drag to look)
        
        // Posición inicial
        // Colocamos el target muy cerca de la cámara para que rote sobre su eje
        camara.position.set(0, 5, 15); // X=0 (centro), Y=5 (altura), Z=15 (profundidad)
        controles.target.set(0, 5, 14); // Mira ligeramente hacia adelante
        controles.update();

        // --- Iluminación ---
        const luzAmbiental = new THREE.AmbientLight(0xffffff, 0.7); // Luz general suave
        escena.add(luzAmbiental);

        const luzDireccional = new THREE.DirectionalLight(0xffffff, 0.6); // Simula el sol o una lámpara fuerte
        luzDireccional.position.set(8, 15, 10); // Posición de la luz
        luzDireccional.castShadow = true; // Esta luz produce sombras
        escena.add(luzDireccional);

        // Luz cenital (desde arriba)
        const luzFocal = new THREE.SpotLight(0xffffff, 0.8, 50, Math.PI / 4, 0.7, 2);
        luzFocal.position.set(0, 25, -12); // Muy arriba
        luzFocal.target.position.set(0, 0, -12); // Apuntando al centro de la mesa
        luzFocal.castShadow = true;
        escena.add(luzFocal);
        escena.add(luzFocal.target);

        // Luz de las velas (se crea con cada vela)
        const candleLights = []; // Array para guardar las luces y apagarlas
        const flameMeshes = [];  // Array para guardar las llamas y ocultarlas
        let tapCount = 0; // Contador de toques en el pastel

        // --- Materiales ---
        // Colores en Hexadecimal: 0xRRGGBB (Ej: 0xFF0000 es Rojo)
        const materialMesa = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.6 }); // Café madera
        const materialPlato = new THREE.MeshStandardMaterial({ color: 0xf0f0f0, roughness: 0.2 }); // Blanco grisáceo brillante
        // const matVela = new THREE.MeshStandardMaterial({ color: 0xFFFFFF }); // Ya no se usa globalmente
        
        // Función para crear la textura de ondas (Agregada para evitar error de referencia)
        function crearTexturaOndas() {
            const width = 1024;
            const height = 1024;
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            
            // Fondo blanco
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, width, height);
            
            const imgData = ctx.getImageData(0, 0, width, height);
            const data = imgData.data;
            
            const GrosorLineaEnMedioDeCadaOnda = 5;
            const colorLineaEnMedioDeCadaOnda = 0x2C2C2C; // Gris medio
            
            const grosor = 10.0;
            const numOndas = 15.0;
            const frecuencia = 20;
            const amplitud = 8;
            const colorGris = 220;
            const spacing = height / numOndas;

            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const nx = (x / width) * Math.PI * 2 * frecuencia;
                    const waveOffset = Math.sin(nx) * amplitud;
                    let distY = (y - waveOffset) % spacing;
                    if (distY < 0) distY += spacing;
                    let dist = Math.min(distY, spacing - distY);
                    if (dist < grosor) {
                        const factor = dist / grosor;
                        const val = colorGris + (255 - colorGris) * factor;
                        const idx = (y * width + x) * 4;
                        data[idx] = val; data[idx+1] = val; data[idx+2] = val;
                    }
                }
            }
            ctx.putImageData(imgData, 0, 0);
            const tex = new THREE.CanvasTexture(canvas);
            tex.colorSpace = THREE.SRGBColorSpace;
            return tex;
        }

        // Función para crear textura de azulejo (Pared de enfrente)
        function crearTexturaAzulejo() {
            const width = 512;
            const height = 512;
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            
            // Fondo azul claro brillante
            ctx.fillStyle = '#E0F7FA'; 
            ctx.fillRect(0, 0, width, height);
            
            // Líneas de mortero
            const cols = 4;
            const rows = 4;
            const tileW = width / cols;
            const tileH = height / rows;
            
            ctx.strokeStyle = '#B0BEC5';
            ctx.lineWidth = 4;
            
            // Dibujar rejilla
            for(let i=0; i<=cols; i++) {
                ctx.beginPath(); ctx.moveTo(i*tileW, 0); ctx.lineTo(i*tileW, height); ctx.stroke();
            }
            for(let i=0; i<=rows; i++) {
                ctx.beginPath(); ctx.moveTo(0, i*tileH); ctx.lineTo(width, i*tileH); ctx.stroke();
            }
            
            const tex = new THREE.CanvasTexture(canvas);
            tex.colorSpace = THREE.SRGBColorSpace;
            tex.wrapS = THREE.RepeatWrapping;
            tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(5, 5);
            return tex;
        }

        const materialParedOndas = new THREE.MeshStandardMaterial({ map: crearTexturaOndas(), side: THREE.BackSide });
        const materialParedPlana = new THREE.MeshStandardMaterial({ color: 0xFFFFFF, side: THREE.BackSide }); // las demas paredes son blancas
        const materialParedAzulejo = new THREE.MeshStandardMaterial({ map: crearTexturaAzulejo(), side: THREE.BackSide, roughness: 0.1, metalness: 0.1 }); // Brillante
        const materialTecho = new THREE.MeshStandardMaterial({ color: 0xffffff, side: THREE.BackSide });
        
        const materialesHabitacion = [
            materialParedAzulejo, // Derecha
            materialParedPlana, // Izquierda
            materialTecho, // Arriba (Techo)
            materialParedPlana, // Abajo (Suelo invisible)
            materialParedAzulejo, // Frente (Pared de enfrente)
            materialParedOndas  // Atrás
        ];

        // --- Objetos 3D ---

        // 1. Habitación (Caja grande invertida)
        // Bajamos la altura para que el techo se vea más cerca (pegado a las bombas)
        // Altura 25. Suelo en -10.1. Techo en -10.1 + 25 = 14.9
        const geoHabitacion = new THREE.BoxGeometry(40, 25, 40);
        const habitacion = new THREE.Mesh(geoHabitacion, materialesHabitacion);
        habitacion.position.y = 2.4; // Ajustado: (25/2) - 10.1 = 12.5 - 10.1 = 2.4 para que el suelo siga en -10.1
        habitacion.receiveShadow = true;
        escena.add(habitacion);

        // 2. Mesa
        const grupoMesa = new THREE.Group();
        
        // Material de Vidrio para la parte superior
        const materialVidrio = new THREE.MeshPhysicalMaterial({
            color: 0xffffff, // Color base
            metalness: 0.1,
            roughness: 0.05, // Muy liso
            transmission: 0.9, // Permite que la luz pase a través (vidrio)
            thickness: 0.5,
            transparent: true,
            opacity: 0.7
        });

        // Tablero cuadrado de la mesa (10 ancho x 10 profundo)
        const geoTableroMesa = new THREE.BoxGeometry(10, 0.4, 10);
        const tableroMesa = new THREE.Mesh(geoTableroMesa, materialVidrio); // Usamos el material de vidrio
        tableroMesa.position.y = 5.45; // Altura del tablero (ajustado sobre bases)
        tableroMesa.receiveShadow = false; // El vidrio no suele recibir sombras duras
        tableroMesa.castShadow = true; // Pero si proyecta (aunque tenue)
        grupoMesa.add(tableroMesa);

        // 2 Patas en el centro con espacio entre si
        const geoPata = new THREE.BoxGeometry(1, 5, 5); // Grosor y altura de las patas
        const matPata = new THREE.MeshStandardMaterial({color: 0x5c4033}); // Color madera oscura
        const geoSoportePatas = new THREE.BoxGeometry(3, 1, 5); // Grosor y altura del soporte de las patas
        // El soporte de las patas es un restangulo horizontal que une las 2 patas de la mesa
        const soportePatas = new THREE.Mesh(geoSoportePatas, matPata); 
        // Ubicamos el soporte donde corresponde uniendo las patas en la mitad de su altura
        soportePatas.position.set(0, 2.5, 0); // Centrado verticalmente respecto a las patas (0-5)
        grupoMesa.add(soportePatas);

        const geoBasesPatas = new THREE.BoxGeometry(1.5, 0.5, 5); // Grosor y altura del soporte de las patas
        // El soporte de las patas es un rectangulo horizontal que une las 2 patas de la mesa
        const basesPatas = new THREE.Mesh(geoBasesPatas, matPata); 
        // Coordenadas [X, Y, Z] para las 4 bases de las patas
        const posicionesBasesPatas = [[-2, 0, 0], [2, 0, 0], [-2, 5, 0], [2, 5, 0]];
        posicionesBasesPatas.forEach(pos => {
            const base = new THREE.Mesh(geoBasesPatas, matPata);
            base.position.set(pos[0], pos[1], pos[2]);
            base.castShadow = true;
            base.receiveShadow = true;
            grupoMesa.add(base);
        });
        
        // Coordenadas [X, Y, Z] para las 2 patas
        const posicionesPatas = [[-2, 2.5, 0], [2, 2.5, 0]]; // Elevadas a 2.5 para cubrir de 0 a 5
        posicionesPatas.forEach(pos => {
            const pata = new THREE.Mesh(geoPata, matPata);
            pata.position.set(pos[0], pos[1], pos[2]);
            pata.castShadow = true;
            pata.receiveShadow = true;
            grupoMesa.add(pata);
        });

        // 3. Plato
        const geoPlato = new THREE.CylinderGeometry(3.5, 3, 0.4, 32); // Geometría para un plato plano
        // Lo subimos para que quede encima de la superficie de la mesa
        geoPlato.translate(0, 5.775, 0); // Ajustado a la nueva altura de la mesa
        const objetoPlato = new THREE.Mesh(geoPlato, materialPlato);
        objetoPlato.receiveShadow = true;
        grupoMesa.add(objetoPlato); // ¡Importante! Añadir el plato al grupo de la mesa

        // Corregimos la posición de la mesa para que su base esté en el suelo (y=0)
        // Modifica 'z' (-12) para mover la mesa más cerca o lejos
        grupoMesa.position.set(0, -10.1, -12); // Bajada para tocar el suelo (suelo en -10.1 local)
        escena.add(grupoMesa);

        // 4. Pastel
        const grupoPastel = new THREE.Group();
        grupoPastel.position.set(0, -4.15, -12); // Ajustado a la nueva altura de la mesa y plato
        
        // Cuerpo del Pastel (1 Piso Grande)
        const geoPastel = new THREE.CylinderGeometry(2.5, 2.5, 2.0, 40);
        const matPastel = new THREE.MeshStandardMaterial({ color: 0xFFB7C5, roughness: 0.4 }); // Rosa pastel suave
        const cuerpoPastel = new THREE.Mesh(geoPastel, matPastel);
        cuerpoPastel.position.y = 1.0; 
        cuerpoPastel.castShadow = true;
        grupoPastel.add(cuerpoPastel);

        // Decoración: Crema en los bordes (Esferas simulando manga pastelera)
        const geoCrema = new THREE.SphereGeometry(0.25, 16, 16);
        const matCrema = new THREE.MeshStandardMaterial({ color: 0xFFFFF0, roughness: 0.2 }); // Blanco crema
        
        const numBolitas = 30;
        const radioCrema = 2.4;
        
        // Función para crear anillos de crema
        const crearDecoracionBorde = (yPos) => {
            for(let i=0; i<numBolitas; i++) {
                const angulo = (i / numBolitas) * Math.PI * 2;
                const bolita = new THREE.Mesh(geoCrema, matCrema);
                // Posicionar en círculo
                bolita.position.set(Math.cos(angulo)*radioCrema, yPos, Math.sin(angulo)*radioCrema);
                grupoPastel.add(bolita);
            }
        };
        
        crearDecoracionBorde(2.0); // Borde superior del pastel
        crearDecoracionBorde(0.1); // Borde inferior del pastel

        escena.add(grupoPastel);

        // Decoraciones de Fiesta (Globos)
        function crearGlobo(color, position, targetPosition) {
            const grupoGlobo = new THREE.Group();
            const matGlobo = new THREE.MeshStandardMaterial({
                color: color,
                roughness: 0.1,
                metalness: 0.5,
            });
            const cuerpo = new THREE.Mesh(new THREE.SphereGeometry(1.5, 32, 32), matGlobo);
            cuerpo.scale.y = 1.2; // Hacerlo un poco ovalado (forma de huevo)
            grupoGlobo.add(cuerpo);

            // El nudo del globo
            const nudo = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.2, 12), matGlobo);
            nudo.position.y = -1.5;
            grupoGlobo.add(nudo);

            // Cuerda
            let cuerdaMesh = null;
            if (targetPosition) {
                // Crear la cuerda como un objeto independiente en la escena para poder estirarla
                const geoCuerda = new THREE.CylinderGeometry(0.02, 0.02, 1);
                geoCuerda.translate(0, 0.5, 0); // Mover pivote a la base para facilitar escalado (aunque usaremos centro y escala)
                const matCuerda = new THREE.MeshBasicMaterial({ color: 0xFFFFFF });
                cuerdaMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 1), matCuerda);
                escena.add(cuerdaMesh);
            }

            grupoGlobo.position.copy(position);
            escena.add(grupoGlobo);

            // Animación de flotar
            const yInicial = position.y;
            function flotar() {
                // Movimiento suave arriba y abajo
                grupoGlobo.position.y = yInicial + Math.sin(Date.now() * 0.001 + position.x) * 0.5;
                // Rotación leve
                grupoGlobo.rotation.z = Math.sin(Date.now() * 0.0005) * 0.05;

                // Actualizar la cuerda para que conecte el nudo con el regalo
                if (cuerdaMesh && targetPosition) {
                    const posNudo = grupoGlobo.position.clone();
                    posNudo.y -= 1.5; // Ajustar al nudo
                    
                    const distancia = posNudo.distanceTo(targetPosition);
                    const puntoMedio = posNudo.clone().add(targetPosition).multiplyScalar(0.5);
                    
                    // Mover cuerda al punto medio
                    cuerdaMesh.position.copy(puntoMedio);
                    // Orientar hacia el nudo
                    cuerdaMesh.lookAt(posNudo); 
                    // Rotar 90 grados en X porque CylinderGeometry está orientado en Y por defecto
                    cuerdaMesh.rotateX(Math.PI / 2);
                    // Escalar para cubrir la distancia
                    cuerdaMesh.scale.set(1, distancia, 1);
                }
                requestAnimationFrame(flotar);
            }
            flotar();

        // tipo: 'ventana' o 'puerta'
        function crearElementoPared(zPos, yPos, ancho, alto, tipo) {
            const grupo = new THREE.Group();
            const colorMarco = 0xE0E0E0; // Marco de madera (blanco hueso para contraste)
            
            // Marco exterior
            const geoMarcoH = new THREE.BoxGeometry(0.5, 0.5, ancho + 0.5); // Se extiende para cubrir las esquinas
            const geoMarcoV = new THREE.BoxGeometry(0.5, alto - 0.5, 0.5); // Se acorta para caber entre los horizontales

            const marcoSuperior = new THREE.Mesh(geoMarcoH, matMarco);
            marcoSuperior.position.y = (alto - 0.5) / 2;
            grupo.add(marcoSuperior);
            if (tipo !== 'puerta') {
                const marcoInferior = new THREE.Mesh(geoMarcoH, matMarco);
                marcoInferior.position.y = -(alto - 0.5) / 2;
                grupo.add(marcoInferior);
            }
            const marcoIzquierdo = new THREE.Mesh(geoMarcoV, matMarco);
            marcoIzquierdo.position.z = -ancho / 2; // Centrado en el borde
            const marcoDerecho = new THREE.Mesh(geoMarcoV, matMarco);
            marcoDerecho.position.z = ancho / 2; // Centrado en el borde
            
            grupo.add(marcoIzquierdo, marcoDerecho);

            if (tipo === 'ventana') {
                // Ventana: Cristal y división vertical
                // Material de vidrio con reflexión (MeshPhysicalMaterial para mejor efecto)
                const matVidrio = new THREE.MeshPhysicalMaterial({
                    color: 0x87CEEB,
                    metalness: 0.1,
                    roughness: 0.05,
                    transmission: 0.2, // Un poco transparente
                    transparent: true,
                    opacity: 0.6,
                    reflectivity: 0.8,
                    clearcoat: 1.0,
                    side: THREE.DoubleSide
                });

                const geoCristal = new THREE.PlaneGeometry(ancho - 0.5, alto - 0.5);
                const mallaCristal = new THREE.Mesh(geoCristal, matVidrio); // Cielo azul con reflejo
                mallaCristal.rotation.y = Math.PI / 2;
                grupo.add(mallaCristal);

                // División Vertical
                const divisor = new THREE.Mesh(new THREE.BoxGeometry(0.3, alto, 0.2), matMarco);
                grupo.add(divisor);

                // Anjeo (Mosquitero) en el vidrio izquierdo
                // El vidrio está en el plano X local. Ancho es Z. Izquierda es Z negativo.
                // Creamos un plano para el anjeo en la mitad izquierda
                const geoAnjeo = new THREE.PlaneGeometry((ancho - 0.5) / 2, alto - 0.5);
                
                // Textura de rejilla para el anjeo
                const canvasAnjeo = document.createElement('canvas');
                canvasAnjeo.width = 64; canvasAnjeo.height = 64;
                const ctxAnjeo = canvasAnjeo.getContext('2d');
                ctxAnjeo.fillStyle = 'rgba(0,0,0,0)'; ctxAnjeo.fillRect(0,0,64,64); // Transparente
                ctxAnjeo.strokeStyle = 'rgba(30,30,30,0.7)'; ctxAnjeo.lineWidth = 2; // Rejilla oscura
                const step = 8;
                for(let i=0; i<64; i+=step) {
                    ctxAnjeo.beginPath(); ctxAnjeo.moveTo(i,0); ctxAnjeo.lineTo(i,64); ctxAnjeo.stroke();
                    ctxAnjeo.beginPath(); ctxAnjeo.moveTo(0,i); ctxAnjeo.lineTo(64,i); ctxAnjeo.stroke();
                }
                const texAnjeo = new THREE.CanvasTexture(canvasAnjeo);
                texAnjeo.wrapS = THREE.RepeatWrapping; texAnjeo.wrapT = THREE.RepeatWrapping;
                texAnjeo.repeat.set(40, 80);

                const matAnjeo = new THREE.MeshBasicMaterial({ map: texAnjeo, transparent: true, side: THREE.DoubleSide });
                const mallaAnjeo = new THREE.Mesh(geoAnjeo, matAnjeo);
                mallaAnjeo.rotation.y = Math.PI / 2;
                mallaAnjeo.position.x = 0.1; 
                // MOVIDO: A la "otra ventanada" (lado derecho, Z positivo local)
                mallaAnjeo.position.z = (ancho - 0.5) / 4; 
                grupo.add(mallaAnjeo);

            } else if (tipo === 'puerta') {
                // Puerta: Panel de madera con patrón
                const panelPuerta = new THREE.Group();
                const numColumnas = 11;
                const anchoColumna = (ancho - 0.5) / numColumnas;
                const altoPuerta = alto - 0.5;
                const matPuerta = new THREE.MeshStandardMaterial({color: 0xFFFCF2}); // Color principal
                const matPuertaHundida = new THREE.MeshStandardMaterial({color: 0xE6E3DA}); // Color más oscuro para ranuras

                for (let i = 0; i < numColumnas; i++) {
                    // Las columnas pares (0, 2, 4) sobresalen, las impares (1, 3) están hundidas.
                    const esSalida = i % 2 === 0;
                    const profundidadColumna = esSalida ? 0.2 : 0.1; // Las hundidas son más delgadas
                    // Para que el frente de la puerta sea plano, movemos las partes hundidas hacia atrás.
                    const posXColumna = esSalida ? 0 : -0.05;

                    const geoColumna = new THREE.BoxGeometry(profundidadColumna, altoPuerta, anchoColumna);
                    const materialColumna = esSalida ? matPuerta : matPuertaHundida;
                    const columna = new THREE.Mesh(geoColumna, materialColumna);

                    // Habilitar que cada parte de la puerta proyecte y reciba sombras
                    columna.castShadow = true;
                    columna.receiveShadow = true;
                    
                    columna.position.x = posXColumna;
                    columna.position.z = -((ancho - 0.5) / 2) + (i * anchoColumna) + (anchoColumna / 2);
                    
                    panelPuerta.add(columna);
                }
                grupo.add(panelPuerta);
                
                // Manija nueva
                const grupoManija = new THREE.Group();
                const matManija = new THREE.MeshStandardMaterial({color: 0xFFFFFF, metalness: 0.8, roughness: 0.2});

                // Placa cerradura ("circular")
                const geoPlacaCerradura = new THREE.CylinderGeometry(0.3, 0.3, 0.2, 20);
                const placaCerradura = new THREE.Mesh(geoPlacaCerradura, matManija);

                placaCerradura.rotateZ(Math.PI / 2); // Para que apunte hacia afuera)
                placaCerradura.position.x = 0;
                placaCerradura.position.y = 0.05;
                placaCerradura.position.z = -5;
                grupoManija.add(placaCerradura);

                // Parte redonda para la llave
                const geoCerradura = new THREE.CylinderGeometry(0.07, 0.07, 0.25, 20);
                geoCerradura.rotateZ(Math.PI / 2); // Para que apunte hacia afuera
                const matCerradura = new THREE.MeshStandardMaterial({color: 0x111111, metalness: 0.8, roughness: 0.2});
                const cerradura = new THREE.Mesh(geoCerradura, matCerradura);
                cerradura.position.x = 0.05;
                cerradura.position.y = 0.15;
                cerradura.position.z = -5;
                grupoManija.add(cerradura);

                // Ranura para la llave
                const geoRanura = new THREE.BoxGeometry(0.3, 0.2, 0.05);
                const matRanura = new THREE.MeshBasicMaterial({color: 0x111111});
                const ranura = new THREE.Mesh(geoRanura, matRanura);
                ranura.position.x = 0.06;
                ranura.position.z = -5;
                grupoManija.add(ranura);

                grupoManija.position.set(0.3, 0, ancho/2 - 1);
                grupo.add(grupoManija);

                const grupoAgarraderaManijaNueva = new THREE.Group();
                // --- 1. MATERIAL METÁLICO (con un poco más de brillo para resaltar las curvas) ---
                const matAgarradera = new THREE.MeshStandardMaterial({
                    color: 0xEEEEEE, // Un gris más claro para que brille más
                    metalness: 1.0,  // Metal completo
                    roughness: 0.1   // Muy pulido
                });

                // --- 2. DEFINICIÓN DE PUNTOS PARA UNA GEOMETRÍA ESCULTURAL ---
                // Añadimos puntos extra (2b, 2c, 5b, 6b) para definir curvas perfectas
                const puntosCurva = [
                    new THREE.Vector3(0, 0.8, 0),         // 1. Inicio Superior (Anclado)
                    new THREE.Vector3(0.15, 0.75, 0),     // 2. Salida suave desde arriba
                    new THREE.Vector3(0.40, 0.65, 0),     // 2b. PUNTO EXTRA: Redondea la parte superior de la barriga
                    new THREE.Vector3(0.50, 0.45, 0),     // 2c. PUNTO EXTRA: El cénit de la barriga (bien definida)
                    new THREE.Vector3(0.40, 0.25, 0),     // 2d. PUNTO EXTRA: Redondea la parte inferior de la barriga
                    new THREE.Vector3(0.15, -0.1, 0),     // 3. Transición bajando
                    new THREE.Vector3(0, -0.45, 0),       // 4. UNIÓN BAJA (Anclado)
                    new THREE.Vector3(0.04, -0.55, 0),    // 5. Salida suave desde la unión
                    new THREE.Vector3(0.1, -0.65, 0),    // 5b. PUNTO EXTRA: Define la curva hacia afuera
                    new THREE.Vector3(0.13, -0.7, 0),    // 6. El punto más salido de la curva final
                    new THREE.Vector3(0.25, -0.88, 0)     // 6b. FIN: Curva sutil hacia adentro, sin tocar la puerta
                ];

                // --- 3. CREACIÓN DE LA CURVA (con suavizado extra) ---
                const curvaAgarradera = new THREE.CatmullRomCurve3(puntosCurva);
                curvaAgarradera.tension = 0.4; // Bajamos un poco la tensión para curvas más orgánicas

                // Geometría de tubo (Aumentamos segmentos para que la curva sea perfecta)
                const tubularSegments = 200; // Más segmentos para curvas ultra suaves
                const radioTubo = 0.05;      // Grosor constante
                const geoAgarradera = new THREE.TubeGeometry(curvaAgarradera, tubularSegments, radioTubo, 16, false);
                const mallaAgarradera = new THREE.Mesh(geoAgarradera, matAgarradera);
                mallaAgarradera.castShadow = true;
                grupoAgarraderaManijaNueva.add(mallaAgarradera);

                // --- 4. SOPORTES ---
                const geoSoporte = new THREE.CylinderGeometry(0.05, 0.07, 0.06, 16);

                // Soporte Superior
                const soporteSup = new THREE.Mesh(geoSoporte, matAgarradera);
                soporteSup.position.set(0, 0.8, 0);
                soporteSup.rotateZ(Math.PI / 2);

                // Soporte Inferior (Ajustado a la unión -0.45)
                const soporteBajo = new THREE.Mesh(geoSoporte, matAgarradera);
                soporteBajo.position.set(0, -0.45, 0); 
                soporteBajo.rotateZ(Math.PI / 2);

                grupoAgarraderaManijaNueva.add(soporteSup, soporteBajo);

                // --- 5. POSICIÓN FINAL ---
                grupoAgarraderaManijaNueva.position.set(0, -1, -2.5);

                // Agregar al grupo de la puerta
                grupo.add(grupoAgarraderaManijaNueva);
            }

        // --- BOMBILLO EN EL TECHO ---
        function crearBombillo() {
            const grupoLuz = new THREE.Group();

// Función para crear la textura de humo sin archivos externos
function crearTexturaHumo() {
    const canvas = document.createElement('canvas');
    canvas.width = 32;
    canvas.height = 32;
    const ctx = canvas.getContext('2d');
    const grad = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
    grad.addColorStop(0, 'rgba(200, 200, 200, 1)'); // Gris en el centro
    grad.addColorStop(1, 'rgba(200, 200, 200, 0)'); // Transparente en bordes
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 32, 32);
    const texture = new THREE.CanvasTexture(canvas);
    return texture;
}

        function iniciarEscuchaSecreta() {
            if (!audioContext && flujoVideo) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                console.log("DEBUG: AudioContext creado. Estado:", audioContext.state);
                microphone = audioContext.createMediaStreamSource(flujoVideo);

        function detectarSoplidoLoop() {
            if (!isListeningForBlow) {
                requestAnimationFrame(detectarSoplidoLoop);
                return;
            }

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);

            // Heurística simple: Soplido genera ruido blanco (energía en todas las frecuencias) y volumen alto
            let sum = 0;
            for(let i = 0; i < bufferLength; i++) sum += dataArray[i];
            const average = sum / bufferLength;

            // Umbral de volumen (ajustar según pruebas, 40-50 es un soplido medio/fuerte cerca del mic)
            if (average > 45) {
                apagarVelasYActivarRegalo();

            requestAnimationFrame(detectarSoplidoLoop);

                giftBox.visible = false;
                innerGiftModel.visible = true;
                controles.autoRotate = true;
                btnActionGift.style.display = 'none';
            }, 1000);
        });

        btnCloseGift.addEventListener('click', () => {
            giftUI.style.display = 'none';
            giftGroup.visible = false;
            grupoPastel.visible = true;
            // controlesPrincipales.style.display = 'block'; // YA NO volvemos a la pantalla principal
            controles.autoRotate = false;

            // Regresar al MODO FOTO automáticamente
            botonModoFoto.click();

            // Restaurar velas (visible)
            setTimeout(() => {
                candleLights.forEach(l => l.intensity = 0.7);
                flameMeshes.forEach(m => m.visible = true);
            }, 1000);
        });

        // Importar TWEEN para animaciones simples sin bloat
        import TWEEN from 'https://unpkg.com/@tweenjs/tween.js@18.6.4/dist/tween.esm.js';

        // 2. Cerrar Modo Foto (X)
        botonCerrarCamara.addEventListener('click', () => {
            // stopCamera(); // YA NO detenemos la cámara para mantener el permiso
            elementoVideo.pause(); // Solo pausamos el video para ahorrar recursos
            interfazFoto.style.display = 'none';
            botonModoFoto.style.display = 'inline-block';
            moverCamaraAFrente(); // Volver a vista general
            detenerCamara(); // Detener la cámara
        });

        function detenerCamara() {
            if (flujoVideo) {
                flujoVideo.getTracks().forEach(track => track.stop());
                flujoVideo = null;
            }
        }

        // 3. Tomar Foto
        botonTomarFoto.addEventListener('click', async () => {
            // 1. Mensaje inicial: No moverse
            mensajeEstado.textContent = "Trata de no moverte, estamos capturando este momento inolvidable...";
            mensajeEstado.style.display = 'block';
            botonTomarFoto.textContent = "📸";
            
            // Esperamos un frame para que se renderice
            await new Promise(r => setTimeout(r, 1300));

            // --- Captura del video en canvas ---
            const escalaCaptura = 10; // Aumentamos la resolución para más nitidez

            // Crear canvas temporal para capturar el frame del video
            const canvasTemporal = document.getElementById('canvas-temporal');
            const ctx = canvasTemporal.getContext('2d');
            canvasTemporal.width = elementoVideo.videoWidth * escalaCaptura;
            canvasTemporal.height = elementoVideo.videoHeight * escalaCaptura;
            
            // Limpiar canvas
            ctx.clearRect(0, 0, canvasTemporal.width, canvasTemporal.height);

            // Dibujar video (espejo horizontal para que se sienta natural como selfie)
            // Guardamos el estado del contexto para invertir
            ctx.save();
            ctx.translate(canvasTemporal.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(elementoVideo, 0, 0, canvasTemporal.width, canvasTemporal.height); // Dibujar a la nueva resolución
            ctx.restore(); // Restaurar para que las siguientes operaciones no estén invertidas

            // Pausar video para congelar la imagen visual
            elementoVideo.pause();

            // 3. Mensaje secundario: Ya puedes moverte
            mensajeEstado.textContent = "Ya puedes moverte, estamos haciendo unos retoques finales a la foto...";

            // --- APLICAR IA (Recorte de Fondo) ---
            if (segmentador) {
                try {
                    // 1. Obtener la segmentación de la imagen actual del canvas
                    const segmentacion = await segmentador.segmentPeople(canvasTemporal);
                    
                    // 2. Crear una máscara binaria (blanco = persona, negro = fondo)
                    // Corrección: Definimos explícitamente que la Persona sea Opaca (255) y el Fondo Transparente (0)
                    const colorFrente = {r: 0, g: 0, b: 0, a: 255};
                    const colorFondo = {r: 0, g: 0, b: 0, a: 0};
                    const imagenMascara = await bodySegmentation.toBinaryMask(segmentacion, colorFrente, colorFondo);
                    
                    // 3. Aplicar la máscara al canvas usando composición
                    // Convertir la máscara a imagen utilizable
                    const canvasMascara = document.createElement('canvas');
                    canvasMascara.width = canvasTemporal.width;
                    canvasMascara.height = canvasTemporal.height;
                    const ctxMascara = canvasMascara.getContext('2d');
                    ctxMascara.putImageData(imagenMascara, 0, 0);

                    // Usamos 'destination-in' para mantener solo lo que coincida con la máscara (la persona)
                    ctx.globalCompositeOperation = 'destination-in';
                    // Dibujamos la máscara (debe estar invertida igual que el video si la detección fue sobre video invertido, pero aquí procesamos el canvas ya invertido)
                    // Nota: segmentPeople procesa la imagen tal cual.
                    ctx.drawImage(canvasMascara, 0, 0);
                    ctx.globalCompositeOperation = 'source-over'; // Resetear
                } catch (err) {
                    console.error("Error al recortar fondo:", err);
                }
            }

            // Crear textura Three.js
            const textura = new THREE.CanvasTexture(canvasTemporal);
            textura.colorSpace = THREE.SRGBColorSpace;
            // Aplicamos el efecto espejo a la textura final
            textura.wrapS = THREE.RepeatWrapping;
            textura.repeat.x = -1;
            
            // Aplicar al marco en la pared
            mallaFoto.material.map = textura;
            mallaFoto.material.color.set(0xffffff); // Resetear color base a blanco para ver textura bien
            mallaFoto.material.opacity = 1; // Hacer visible la foto
            mallaFoto.material.needsUpdate = true;

            // Detener cámara y volver a la escena
            detenerCamara(); // Ahora detenemos la cámara, después de todo el procesamiento
            interfazFoto.style.display = 'none';
            botonTomarFoto.textContent = "📷"; // Restaurar icono
            mensajeEstado.style.display = 'none'; // Ocultar mensaje

            // Mostrar controles de resultado
            botonModoFoto.style.display = 'none';
            controlesResultado.style.display = 'flex';

            moverCamaraAFrente();
        });

        function moverCamaraAPosicionPosado() {
            // Perspectiva "desde la pared":
            // La cámara se posiciona a la altura de la foto (y=-1) y mira hacia el pastel (y=-3)
            // Se coloca en z=-18 para estar detrás del pastel (z=-12) pero delante de la pared (z=-19.9)
            // Corregimos la altura (y=-1) para que no quede bajo el suelo y la vista (y=-3)
            animarCamara(new THREE.Vector3(0, -1, -19), new THREE.Vector3(0, -1, 0), () => {
                // Una vez que la cámara llega, aplicamos el mismo estilo de control que la cámara principal.
                controles.minAzimuthAngle = -Infinity;
                controles.maxAzimuthAngle = Infinity;
                controles.minPolarAngle = 0;
                controles.maxPolarAngle = Math.PI; // Permitir mirar hasta arriba de nuevo
                controles.enableZoom = false;
                controles.rotateSpeed = -0.5; // Usar el modo "mirar alrededor" (drag to look)
                controles.update();
            });
        }

        function moverCamaraAFrente() {
            // Restaurar los controles a sus valores por defecto
            controles.minAzimuthAngle = -Infinity;
            controles.maxAzimuthAngle = Infinity;
            controles.minPolarAngle = 0;
            controles.maxPolarAngle = Math.PI; // Permitir mirar arriba de nuevo
            controles.enableZoom = false;
            controles.rotateSpeed = -0.5; // Volver al modo "mirar alrededor"

            // Volver a la posición central mirando al frente
            animarCamara(new THREE.Vector3(0, 5, 15), new THREE.Vector3(0, 5, 14));
        }

        function animarCamara(posicionDestino, mirarA, alCompletar) {
            // Animación simple
            let alpha = 0;
            const posInicial = camara.position.clone();
            const objetivoInicial = controles.target.clone();
            
            function animarCam() {
                alpha += 0.03;
                if (alpha > 1) {
                    alpha = 1;
                }
                
                // Interpolar la posición de la cámara y el punto de mira (target)
                camara.position.lerpVectors(posInicial, posicionDestino, alpha);
                controles.target.lerpVectors(objetivoInicial, mirarA, alpha);

                if (alpha < 1) {
                    requestAnimationFrame(animarCam);
                } else {
                    camara.position.copy(posicionDestino);
                    controles.target.copy(mirarA);
                    if (alCompletar) {
                        alCompletar();
                    }
                }
            }
            animarCam();
        }

        // 4. Repetir Foto
        botonRepetir.addEventListener('click', () => {
            // Ocultar la foto anterior para que la pared esté limpia
            mallaFoto.material.opacity = 0;
            mallaFoto.material.needsUpdate = true;

            controlesResultado.style.display = 'none';
            botonModoFoto.click(); // Simular click para abrir cámara de nuevo
        });

        // 5. Compartir (Condensar y Guardar/Share)
        botonCompartir.addEventListener('click', async () => {
            // Ocultar UI temporalmente para la foto limpia
            controlesPrincipales.style.display = 'none';
            
            // Renderizar un frame limpio
            renderizador.render(escena, camara);
            
            // Obtener DataURL
            const dataURL = renderizador.domElement.toDataURL("image/png");
            
            // Restaurar UI
            controlesPrincipales.style.display = 'block';

            // --- Lógica de Guardado ---
            const nombreArchivo = `cumple_majo_22_${Date.now()}.png`;
            
            // Convertir Base64 a Blob para compartir
            const blob = await (await fetch(dataURL)).blob();
            const archivo = new File([blob], nombreArchivo, { type: blob.type });

            // 1. Guardar en dispositivo (Descarga forzada)
            const enlace = document.createElement('a');
            enlace.href = dataURL;
            enlace.download = nombreArchivo;
            enlace.click();

            // 2. Compartir usando API nativa (Web Share API)
            if (navigator.share && navigator.canShare({ files: [archivo] })) {
                try {
                    await navigator.share({
                        title: 'Feliz Cumple Majo 22',
                        text: '¡Mira mi foto en la fiesta virtual que me hizo Migue!',
                        files: [archivo]
                    });
                } catch (error) {
                    console.log('Error compartiendo:', error);
                }
            } else {
                alert("Imagen guardada en tu galería.");
            }
        });

        // --- Loop Principal ---
        function animar() {
            requestAnimationFrame(animar);
            
            // Rotación suave del pastel si no se está interactuando
            // cakeGroup.rotation.y += 0.005; 
            
            updateSmoke(); // Actualizar partículas de humo
            TWEEN.update(); // Actualizar interpolaciones
            
            controles.update();
            renderizador.render(escena, camara);
        }
        animar();

        // Ajustar al redimensionar ventana
        window.addEventListener('resize', () => {
            camara.aspect = window.innerWidth / window.innerHeight;
            camara.updateProjectionMatrix();
            renderizador.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
